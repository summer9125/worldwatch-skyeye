<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWatch 天眼 - 全球动态监控系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #0a0e27; color: #fff; }
        .header { background: linear-gradient(135deg, #1a1f3f 0%, #0a0e27 100%); padding: 20px 40px; border-bottom: 1px solid #2a3f5f; }
        .header h1 { font-size: 28px; font-weight: 600; color: #00d4ff; }
        .header p { color: #8899aa; margin-top: 8px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #1a1f3f 0%, #0f1428 100%); border: 1px solid #2a3f5f; border-radius: 12px; padding: 24px; }
        .stat-card .value { font-size: 36px; font-weight: 700; color: #00d4ff; }
        .stat-card .label { color: #8899aa; margin-top: 8px; font-size: 14px; }
        .section { background: linear-gradient(135deg, #1a1f3f 0%, #0f1428 100%); border: 1px solid #2a3f5f; border-radius: 12px; padding: 24px; margin-bottom: 30px; }
        .section h2 { font-size: 20px; margin-bottom: 20px; color: #00d4ff; }
        .event-list { display: grid; gap: 16px; }
        .event-card { background: #0f1428; border: 1px solid #2a3f5f; border-radius: 8px; padding: 20px; transition: all 0.3s; }
        .event-card:hover { border-color: #00d4ff; transform: translateY(-2px); }
        .event-card .title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #fff; }
        .event-card .meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
        .event-card .meta span { font-size: 13px; color: #8899aa; background: #1a1f3f; padding: 4px 12px; border-radius: 4px; }
        .event-card .summary { color: #aabbcc; font-size: 14px; line-height: 1.6; }
        .event-card .severity { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-top: 12px; }
        .severity.critical { background: #dc3545; color: #fff; }
        .severity.high { background: #fd7e14; color: #fff; }
        .severity.medium { background: #ffc107; color: #000; }
        .severity.low { background: #28a745; color: #fff; }
        .loading { text-align: center; padding: 60px 20px; color: #8899aa; }
        .error { background: #dc3545; color: #fff; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
        .refresh-btn { background: #00d4ff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        .refresh-btn:hover { background: #00b8e6; }
        .footer { text-align: center; padding: 40px; color: #8899aa; border-top: 1px solid #2a3f5f; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌍 WorldWatch 天眼</h1>
        <p>全球动态监控系统 - 实时监控全球热点事件</p>
    </div>
    
    <div class="container">
        <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
        
        <div class="stats">
            <div class="stat-card">
                <div class="value" id="totalEvents">-</div>
                <div class="label">总事件数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="alertEvents">-</div>
                <div class="label">告警事件</div>
            </div>
            <div class="stat-card">
                <div class="value" id="regions">-</div>
                <div class="label">覆盖地区</div>
            </div>
            <div class="stat-card">
                <div class="value" id="lastUpdate">-</div>
                <div class="label">最后更新</div>
            </div>
        </div>
        
        <div class="section">
            <h2>📊 热门事件</h2>
            <div class="event-list" id="eventList">
                <div class="loading">正在加载数据...</div>
            </div>
        </div>
        
        <div class="footer">
            <p>WorldWatch 天眼 v1.0.0</p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        async function loadData() {
            try {
                // 加载统计
                const statsRes = await fetch(`${API_BASE}/api/v1/events/stats/overview`);
                const stats = await statsRes.json();
                
                if (stats.code === 0) {
                    document.getElementById('totalEvents').textContent = stats.data.total_events || 0;
                    document.getElementById('alertEvents').textContent = stats.data.alert_events || 0;
                    document.getElementById('regions').textContent = stats.data.by_region?.length || 0;
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
                }
                
                // 加载事件列表
                const eventsRes = await fetch(`${API_BASE}/api/v1/events/list?limit=20`);
                const events = await eventsRes.json();
                
                const eventList = document.getElementById('eventList');
                if (events.code === 0 && events.data.length > 0) {
                    eventList.innerHTML = events.data.map(event => `
                        <div class="event-card">
                            <div class="title">${escapeHtml(event.title)}</div>
                            <div class="meta">
                                <span>📍 ${event.region || '未知'}</span>
                                <span>🏷️ ${event.category || '其他'}</span>
                                <span>🔥 热度：${event.heat_score || 0}</span>
                                <span>🕐 ${event.publish_time ? new Date(event.publish_time).toLocaleString('zh-CN') : '未知'}</span>
                            </div>
                            <div class="summary">${escapeHtml(event.summary || '暂无摘要')}</div>
                            ${event.severity ? `<span class="severity ${event.severity}">${getSeverityText(event.severity)}</span>` : ''}
                        </div>
                    `).join('');
                } else {
                    eventList.innerHTML = '<div class="loading">暂无事件数据</div>';
                }
            } catch (error) {
                document.getElementById('eventList').innerHTML = `
                    <div class="error">加载失败：${error.message}</div>
                    <div class="loading">请确保后端服务正在运行</div>
                `;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getSeverityText(severity) {
            const map = { critical: '严重', high: '高', medium: '中', low: '低' };
            return map[severity] || severity;
        }
        
        // 初始加载
        loadData();
        
        // 每 60 秒自动刷新
        setInterval(loadData, 60000);
    </script>
</body>
</html>
