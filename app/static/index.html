<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWatch 天眼 - 全球动态监控指挥中心</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/world.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c1929 0%, #1a2a4a 100%);
            color: #e0e6ed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 顶部导航 */
        .header {
            background: rgba(12, 25, 41, 0.95);
            border-bottom: 1px solid #1e3a5f;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 20px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .lang-select {
            background: rgba(30, 58, 95, 0.5);
            border: 1px solid #1e3a5f;
            color: #e0e6ed;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .time-display {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #00d9ff;
        }

        /* 主容器 */
        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 20px;
            padding: 80px 20px 20px;
            min-height: 100vh;
        }

        /* 通用面板样式 */
        .panel {
            background: rgba(18, 32, 53, 0.8);
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(90deg, rgba(30, 58, 95, 0.8), rgba(18, 32, 53, 0.8));
            padding: 12px 16px;
            border-bottom: 1px solid #1e3a5f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
        }

        .panel-content {
            padding: 16px;
        }

        /* 左侧面板 */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.5), rgba(18, 32, 53, 0.5));
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: #8899ac;
            margin-top: 4px;
        }

        .region-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .region-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(30, 58, 95, 0.5);
            cursor: pointer;
            transition: background 0.2s;
        }

        .region-item:hover {
            background: rgba(30, 58, 95, 0.3);
        }

        .region-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .region-flag {
            font-size: 16px;
        }

        .region-count {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        /* 中间地图区域 */
        .center-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .map-container {
            flex: 1;
            min-height: 500px;
        }

        #worldMap {
            width: 100%;
            height: 100%;
            min-height: 500px;
        }

        .events-feed {
            max-height: 300px;
            overflow-y: auto;
        }

        .event-item {
            background: rgba(30, 58, 95, 0.3);
            border-left: 3px solid #00d9ff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .event-item:hover {
            background: rgba(30, 58, 95, 0.5);
            transform: translateX(5px);
        }

        .event-item.critical { border-left-color: #ff4757; }
        .event-item.high { border-left-color: #ffa502; }
        .event-item.medium { border-left-color: #ffdd59; }
        .event-item.low { border-left-color: #00d9ff; }

        .event-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .event-meta {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: #8899ac;
        }

        .event-source {
            color: #00d9ff;
        }

        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .category-chart {
            height: 200px;
        }

        .alert-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .alert-icon {
            font-size: 18px;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .alert-time {
            font-size: 10px;
            color: #8899ac;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(18, 32, 53, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #1e3a5f;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2a4a6f;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #8899ac;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 217, 255, 0.2);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 1400px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .left-panel, .right-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🌍</span>
            <span class="logo-text">WorldWatch 天眼</span>
        </div>
        <div class="header-controls">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>系统运行正常</span>
            </div>
            <select class="lang-select" id="langSelect">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁體中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
            </select>
            <div class="time-display" id="timeDisplay">--:--:--</div>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="panel">
                <div class="panel-header">
                    <span>📊 统计概览</span>
                </div>
                <div class="panel-content">
                    <div class="stats-card">
                        <div class="stat-value" id="totalEvents">-</div>
                        <div class="stat-label">总事件数</div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                        <div class="stats-card">
                            <div class="stat-value" id="alertCount">-</div>
                            <div class="stat-label">告警事件</div>
                        </div>
                        <div class="stats-card">
                            <div class="stat-value" id="regionCount">-</div>
                            <div class="stat-label">覆盖地区</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span>🌏 地区分布</span>
                </div>
                <div class="panel-content">
                    <div class="region-list" id="regionList">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 中间面板 -->
        <div class="center-panel">
            <div class="panel">
                <div class="panel-header">
                    <span>🗺️ 全球监控地图</span>
                    <button onclick="refreshData()" style="background: rgba(0,217,255,0.2); border: 1px solid #00d9ff; color: #00d9ff; padding: 4px 12px; border-radius: 4px; cursor: pointer;">🔄 刷新</button>
                </div>
                <div class="panel-content">
                    <div id="worldMap" class="map-container"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span>🔥 实时事件流</span>
                </div>
                <div class="panel-content">
                    <div class="events-feed" id="eventsFeed">
                        <div class="loading">
                            <div class="spinner"></div>
                            <span style="margin-left: 10px;">正在加载全球动态数据...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="right-panel">
            <div class="panel">
                <div class="panel-header">
                    <span>📈 事件分类</span>
                </div>
                <div class="panel-content">
                    <div id="categoryChart" class="category-chart"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span>⚠️ 告警列表</span>
                </div>
                <div class="panel-content">
                    <div class="alert-list" id="alertList">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span>ℹ️ 数据源</span>
                </div>
                <div class="panel-content" style="font-size: 12px; color: #8899ac; line-height: 1.8;">
                    <div>📰 BBC World News</div>
                    <div>📰 CNN International</div>
                    <div>📰 Reuters</div>
                    <div>📰 Al Jazeera</div>
                    <div>💬 Reddit r/worldnews</div>
                    <div>💬 Reddit r/news</div>
                    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(30,58,95,0.5);">
                        🕐 更新频率：10 分钟
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 多语言配置
        const i18n = {
            'zh-CN': {
                totalEvents: '总事件数',
                alertEvents: '告警事件',
                regions: '覆盖地区',
                loading: '正在加载全球动态数据...'
            },
            'en': {
                totalEvents: 'Total Events',
                alertEvents: 'Alert Events',
                regions: 'Regions',
                loading: 'Loading global events...'
            }
        };

        let currentLang = 'zh-CN';
        let worldMap = null;
        let categoryChart = null;

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 初始化地图
        function initMap() {
            worldMap = echarts.init(document.getElementById('worldMap'));
            const option = {
                backgroundColor: 'transparent',
                geo: {
                    map: 'world',
                    roam: true,
                    zoom: 1.2,
                    label: { show: false },
                    itemStyle: {
                        areaColor: '#1a2a4a',
                        borderColor: '#2a4a6f',
                        borderWidth: 1
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#2a4a6f'
                        }
                    }
                },
                series: [{
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    symbolSize: 10,
                    itemStyle: {
                        color: '#00d9ff'
                    }
                }]
            };
            worldMap.setOption(option);
            window.addEventListener('resize', () => worldMap.resize());
        }

        // 初始化分类图表
        function initCategoryChart() {
            categoryChart = echarts.init(document.getElementById('categoryChart'));
            const option = {
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    itemStyle: {
                        borderRadius: 5,
                        borderColor: '#1a2a4a',
                        borderWidth: 2
                    },
                    label: { show: false },
                    data: []
                }]
            };
            categoryChart.setOption(option);
            window.addEventListener('resize', () => categoryChart.resize());
        }

        // 加载数据
        async function loadData() {
            try {
                const [eventsRes, statsRes] = await Promise.all([
                    fetch('/api/v1/events/list?limit=50'),
                    fetch('/api/v1/events/stats/overview')
                ]);

                const eventsData = await eventsRes.json();
                const statsData = await statsRes.json();

                updateStats(statsData.data);
                updateEventsFeed(eventsData.data);
                updateRegionList(statsData.data.by_region);
                updateCategoryChart(statsData.data.by_category);
                updateAlertList(eventsData.data.filter(e => e.is_alert));
                updateMapMarkers(eventsData.data);

            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 更新统计
        function updateStats(stats) {
            document.getElementById('totalEvents').textContent = stats.total_events || 0;
            document.getElementById('alertCount').textContent = stats.alert_events || 0;
            document.getElementById('regionCount').textContent = Object.keys(stats.by_region || {}).length;
        }

        // 更新事件流
        function updateEventsFeed(events) {
            const container = document.getElementById('eventsFeed');
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="loading">暂无事件数据</div>';
                return;
            }

            container.innerHTML = events.map(event => `
                <div class="event-item ${event.severity}" onclick="showEventDetail('${event.title}')">
                    <div class="event-title">${escapeHtml(event.title)}</div>
                    <div class="event-meta">
                        <span class="event-source">📰 ${escapeHtml(event.source)}</span>
                        <span>🌏 ${escapeHtml(event.region)}</span>
                        <span>🕐 ${formatTime(event.publish_time)}</span>
                    </div>
                </div>
            `).join('');
        }

        // 更新地区列表
        function updateRegionList(regions) {
            const container = document.getElementById('regionList');
            if (!regions || regions.length === 0) {
                container.innerHTML = '<div class="loading">暂无地区数据</div>';
                return;
            }

            const flags = {
                '全球': '🌍', '北美': '🇺🇸', '欧洲': '🇪🇺', '亚洲': '🌏',
                '中东': '🕌', '非洲': '🌍', '南美': '🌎', '大洋洲': '🌏'
            };

            container.innerHTML = regions.map(r => `
                <div class="region-item">
                    <div class="region-name">
                        <span class="region-flag">${flags[r.region] || '🌐'}</span>
                        <span>${escapeHtml(r.region)}</span>
                    </div>
                    <div class="region-count">${r.count}</div>
                </div>
            `).join('');
        }

        // 更新分类图表
        function updateCategoryChart(categories) {
            if (!categoryChart || !categories) return;
            const colors = ['#00d9ff', '#00ff88', '#ffdd59', '#ffa502', '#ff4757', '#a55eea'];
            categoryChart.setOption({
                series: [{
                    data: categories.map((c, i) => ({
                        name: c.category,
                        value: c.count,
                        itemStyle: { color: colors[i % colors.length] }
                    }))
                }]
            });
        }

        // 更新告警列表
        function updateAlertList(alerts) {
            const container = document.getElementById('alertList');
            if (!alerts || alerts.length === 0) {
                container.innerHTML = '<div class="loading" style="height: 100px;">暂无告警</div>';
                return;
            }

            container.innerHTML = alerts.slice(0, 10).map(alert => `
                <div class="alert-item">
                    <span class="alert-icon">⚠️</span>
                    <div class="alert-content">
                        <div class="alert-title">${escapeHtml(alert.title)}</div>
                        <div class="alert-time">${formatTime(alert.publish_time)}</div>
                    </div>
                </div>
            `).join('');
        }

        // 更新地图标记
        function updateMapMarkers(events) {
            if (!worldMap || !events) return;
            const regionCoords = {
                '全球': [0, 20], '北美': [-100, 45], '欧洲': [10, 50],
                '亚洲': [100, 35], '中东': [50, 30], '非洲': [20, 0],
                '南美': [-60, -15], '大洋洲': [140, -25]
            };

            const data = events
                .filter(e => regionCoords[e.region])
                .map(e => ({
                    name: e.region,
                    value: [...regionCoords[e.region], e.heat_score || 50]
                }));

            worldMap.setOption({
                series: [{
                    type: 'effectScatter',
                    coordinateSystem: 'geo',
                    data: data,
                    symbolSize: 15,
                    showEffectOn: 'render',
                    rippleEffect: { brushType: 'stroke', scale: 3 },
                    itemStyle: {
                        color: function(params) {
                            return params.value[2] > 80 ? '#ff4757' :
                                   params.value[2] > 50 ? '#ffa502' : '#00d9ff';
                        }
                    }
                }]
            });
        }

        // 刷新数据
        function refreshData() {
            loadData();
        }

        // 显示事件详情
        function showEventDetail(title) {
            alert('事件详情：' + title);
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleString(currentLang, {
                month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        // 语言切换
        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            loadData();
        });

        // 初始化
        initMap();
        initCategoryChart();
        loadData();
        setInterval(loadData, 600000); // 10 分钟自动刷新
    </script>
</body>
</html>
