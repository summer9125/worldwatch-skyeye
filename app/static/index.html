<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>WorldWatch 天眼 - 全球动态监控指挥中心</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --primary: #00d9ff;
            --success: #00ff88;
            --warning: #ffa502;
            --danger: #ff4757;
            --bg-dark: #0c1929;
            --bg-card: rgba(18, 32, 53, 0.9);
            --border: #1e3a5f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: radial-gradient(ellipse at top, #1a2a4a 0%, var(--bg-dark) 100%);
            color: #e0e6ed;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            overflow-x: hidden;
        }
        
        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -20%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(0,217,255,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        .header {
            background: rgba(12, 25, 41, 0.95);
            border-bottom: 1px solid var(--border);
            padding: 0 calc(16px + var(--safe-left)) 0 calc(16px + var(--safe-right));
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            height: calc(56px + var(--safe-top));
            padding-top: var(--safe-top);
            display: flex;
            align-items: center;
            justify-content: space-between;
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            backdrop-filter: saturate(180%) blur(20px);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 24px; flex-shrink: 0; }
        .logo-text {
            font-size: 17px; font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        .header-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .status-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--success);
            border-radius: 16px;
            font-size: 11px;
        }
        .status-dot {
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .time-display { font-family: 'Courier New', monospace; font-size: 13px; color: var(--primary); }
        
        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            padding: calc(72px + var(--safe-top)) calc(16px + var(--safe-right)) 16px calc(16px + var(--safe-left));
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .panel-header {
            background: linear-gradient(90deg, rgba(30, 58, 95, 0.9), rgba(18, 32, 53, 0.9));
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-content { padding: 16px; }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .stats-card {
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.6), rgba(18, 32, 53, 0.6));
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid rgba(30, 58, 95, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stats-card:active { transform: scale(0.96); }
        .stat-value {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { font-size: 11px; color: #8899ac; margin-top: 6px; }
        
        /* 世界地图可视化 */
        .world-map-viz {
            position: relative;
            min-height: 300px;
            background: linear-gradient(180deg, rgba(12, 25, 41, 0.8) 0%, rgba(18, 32, 53, 0.8) 100%);
            border-radius: 12px;
            overflow: hidden;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            padding: 16px;
        }
        .map-cell {
            aspect-ratio: 1;
            background: rgba(30, 58, 95, 0.3);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }
        .map-cell:active { transform: scale(0.95); }
        .map-cell.active {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(0, 255, 136, 0.1));
            border: 1px solid var(--primary);
        }
        .map-cell-icon { font-size: 20px; margin-bottom: 4px; }
        .map-cell-label { font-size: 10px; color: #8899ac; }
        .map-cell-value { font-size: 16px; font-weight: 700; color: var(--primary); margin-top: 2px; }
        .map-cell-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.3) 0%, transparent 70%);
            animation: cellPulse 2s infinite;
        }
        @keyframes cellPulse {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* 事件列表 */
        .events-feed { max-height: 400px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .event-item {
            background: rgba(30, 58, 95, 0.4);
            border-left: 3px solid var(--primary);
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .event-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .event-item:hover::before, .event-item:active::before { opacity: 1; }
        .event-item:active { transform: translateX(3px); }
        .event-item.critical { border-left-color: var(--danger); }
        .event-item.high { border-left-color: var(--warning); }
        .event-item.medium { border-left-color: #ffdd59; }
        .event-item.low { border-left-color: var(--primary); }
        .event-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.5; }
        .event-meta { display: flex; gap: 10px; font-size: 11px; color: #8899ac; flex-wrap: wrap; }
        .event-source { color: var(--primary); }
        .event-severity {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .severity-critical { background: rgba(255, 71, 87, 0.2); color: var(--danger); }
        .severity-high { background: rgba(255, 165, 2, 0.2); color: var(--warning); }
        .severity-medium { background: rgba(255, 221, 89, 0.2); color: #ffdd59; }
        .severity-low { background: rgba(0, 217, 255, 0.2); color: var(--primary); }
        
        /* 地区列表 */
        .region-list { max-height: 250px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .region-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(30, 58, 95, 0.5);
            cursor: pointer;
            transition: background 0.2s;
        }
        .region-item:active { background: rgba(30, 58, 95, 0.3); }
        .region-item:last-child { border-bottom: none; }
        .region-name { display: flex; align-items: center; gap: 10px; }
        .region-flag { font-size: 18px; }
        .region-count {
            background: rgba(0, 217, 255, 0.2);
            color: var(--primary);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* 分类列表 */
        .category-list { }
        .category-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(30, 58, 95, 0.5);
        }
        .category-item:last-child { border-bottom: none; }
        .category-name { display: flex; align-items: center; gap: 10px; }
        .category-icon { font-size: 18px; }
        .category-bar {
            flex: 1;
            height: 6px;
            background: rgba(30, 58, 95, 0.5);
            border-radius: 3px;
            margin: 0 12px;
            overflow: hidden;
        }
        .category-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .category-count { font-size: 12px; color: var(--primary); min-width: 30px; text-align: right; font-weight: 600; }
        
        /* 告警列表 */
        .alert-list { max-height: 250px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .alert-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .alert-item:active { transform: scale(0.98); }
        .alert-item:last-child { margin-bottom: 0; }
        .alert-icon { font-size: 20px; }
        .alert-content { flex: 1; min-width: 0; }
        .alert-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .alert-time { font-size: 10px; color: #8899ac; }
        
        /* 数据源 */
        .data-sources { font-size: 13px; color: #8899ac; line-height: 2.2; }
        
        .refresh-btn {
            background: rgba(0,217,255,0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .refresh-btn:active {
            background: rgba(0,217,255,0.3);
            transform: scale(0.95);
        }
        
        .loading {
            display: flex; align-items: center; justify-content: center;
            padding: 30px 20px;
            color: #8899ac;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(0, 217, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .update-time {
            text-align: center;
            font-size: 11px;
            color: #8899ac;
            padding: 12px;
            border-top: 1px solid rgba(30, 58, 95, 0.5);
        }
        
        /* 事件详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: var(--safe-bottom);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: linear-gradient(180deg, #1a2a4a 0%, var(--bg-dark) 100%);
            border-top: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(30, 58, 95, 0.5);
            border: none;
            color: #e0e6ed;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body { padding: 20px; }
        .event-detail-section { margin-bottom: 20px; }
        .event-detail-label { font-size: 12px; color: #8899ac; margin-bottom: 8px; }
        .event-detail-value { font-size: 15px; line-height: 1.6; }
        .event-detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #8899ac;
        }
        .event-link {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: linear-gradient(90deg, var(--primary), var(--success));
            color: var(--bg-dark);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        
        /* 响应式 */
        @media (min-width: 640px) {
            .main-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .panel:first-child { grid-column: 1 / -1; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
        }
        
        @media (min-width: 1024px) {
            .main-container {
                grid-template-columns: 280px 1fr 320px;
                padding: 80px 24px 24px;
                gap: 20px;
                max-width: 1400px;
                margin: 0 auto;
            }
            .panel:first-child { grid-column: auto; }
        }
        
        @media (max-width: 375px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .map-grid { grid-template-columns: repeat(3, 1fr); }
            .stat-value { font-size: 22px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🌍</span>
            <span class="logo-text">WorldWatch 天眼</span>
        </div>
        <div class="header-controls">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>运行正常</span>
            </div>
            <div class="time-display" id="timeDisplay">--:--</div>
        </div>
    </header>

    <div class="main-container">
        <!-- 统计概览 -->
        <div class="panel">
            <div class="panel-header">📊 统计概览</div>
            <div class="panel-content">
                <div class="stats-grid">
                    <div class="stats-card">
                        <div class="stat-value" id="totalEvents">-</div>
                        <div class="stat-label">总事件</div>
                    </div>
                    <div class="stats-card">
                        <div class="stat-value" id="alertCount">-</div>
                        <div class="stat-label">告警</div>
                    </div>
                    <div class="stats-card">
                        <div class="stat-value" id="regionCount">-</div>
                        <div class="stat-label">地区</div>
                    </div>
                    <div class="stats-card">
                        <div class="stat-value" id="updateTime">-</div>
                        <div class="stat-label">分钟</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 全球动态地图 -->
        <div class="panel">
            <div class="panel-header">
                <span>🗺️ 全球动态监控</span>
                <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
            </div>
            <div class="panel-content">
                <div class="world-map-viz">
                    <div class="map-grid" id="worldMapGrid">
                        <div class="loading">
                            <div class="spinner"></div>
                            <span>加载地图...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 实时事件流 -->
        <div class="panel">
            <div class="panel-header">🔥 实时事件流</div>
            <div class="panel-content">
                <div class="events-feed" id="eventsFeed">
                    <div class="loading">
                        <div class="spinner"></div>
                        <span>加载中...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 地区分布 -->
        <div class="panel">
            <div class="panel-header">🌏 地区分布</div>
            <div class="panel-content">
                <div class="region-list" id="regionList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 事件分类 -->
        <div class="panel">
            <div class="panel-header">📈 事件分类</div>
            <div class="panel-content">
                <div class="category-list" id="categoryList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 告警列表 -->
        <div class="panel">
            <div class="panel-header">⚠️ 告警列表</div>
            <div class="panel-content">
                <div class="alert-list" id="alertList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据源 -->
        <div class="panel">
            <div class="panel-header">ℹ️ 数据源</div>
            <div class="panel-content">
                <div class="data-sources">
                    <div>📰 36Kr</div>
                    <div>📰 IT 之家</div>
                    <div>📰 The Verge</div>
                    <div>📰 TechCrunch</div>
                    <div>💬 Reddit</div>
                </div>
                <div class="update-time" id="updateTimeText"></div>
            </div>
        </div>
    </div>

    <!-- 事件详情弹窗 -->
    <div class="modal-overlay" id="eventModal" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">事件详情</div>
                <button class="modal-close" onclick="closeModalBtn()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 详情内容动态加载 -->
            </div>
        </div>
    </div>

    <script>
        let dataCache = null;
        let currentEvent = null;

        // 世界地图区域配置
        const worldRegions = [
            { id: 'asia', name: '亚洲', icon: '🌏', countries: ['中国', '日本', '韩国', '印度'] },
            { id: 'europe', name: '欧洲', icon: '🇪🇺', countries: ['英国', '法国', '德国'] },
            { id: 'na', name: '北美', icon: '🇺🇸', countries: ['美国', '加拿大'] },
            { id: 'sa', name: '南美', icon: '🌎', countries: ['巴西', '阿根廷'] },
            { id: 'africa', name: '非洲', icon: '🌍', countries: ['埃及', '南非'] },
            { id: 'oceania', name: '大洋洲', icon: '🌏', countries: ['澳大利亚', '新西兰'] },
            { id: 'middle_east', name: '中东', icon: '🕌', countries: ['阿联酋', '沙特'] },
            { id: 'sea', name: '东南亚', icon: '🌴', countries: ['泰国', '越南', '印尼'] },
            { id: 'central_asia', name: '中亚', icon: '🏔️', countries: ['哈萨克斯坦'] },
            { id: 'north_asia', name: '北亚', icon: '❄️', countries: ['俄罗斯'] },
            { id: 'caribbean', name: '加勒比', icon: '🏝️', countries: ['古巴'] },
            { id: 'arctic', name: '北极', icon: '🧊', countries: ['格陵兰'] }
        ];

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit', hour12: false});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 加载数据
        async function loadData() {
            const feed = document.getElementById('eventsFeed');
            feed.innerHTML = '<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
            
            try {
                const res = await fetch('/api/v1/events/list?limit=50');
                const result = await res.json();
                dataCache = result;
                
                updateStats(result.data);
                updateWorldMap(result.data);
                updateEventsFeed(result.data);
                updateRegionList(result.data);
                updateCategoryList(result.data);
                updateAlertList(result.data);
                updateUpdateTime(result.last_update);
            } catch(error) {
                console.error('加载失败:', error);
                feed.innerHTML = '<div class="loading">加载失败，请刷新</div>';
            }
        }

        function updateStats(events) {
            const regions = new Set(events.map(e => e.region));
            const alerts = events.filter(e => e.is_alert).length;
            document.getElementById('totalEvents').textContent = events.length;
            document.getElementById('alertCount').textContent = alerts;
            document.getElementById('regionCount').textContent = regions.size;
            
            // 计算更新时长
            if (dataCache?.last_update) {
                const minutes = Math.floor((Date.now() - new Date(dataCache.last_update).getTime()) / 60000);
                document.getElementById('updateTime').textContent = minutes < 1 ? '<1' : minutes;
            }
        }

        function updateWorldMap(events) {
            const regionCount = {};
            events.forEach(e => {
                regionCount[e.region] = (regionCount[e.region] || 0) + 1;
            });
            
            const container = document.getElementById('worldMapGrid');
            container.innerHTML = worldRegions.map(r => {
                const count = regionCount[r.name] || 0;
                const isActive = count > 0;
                return `
                    <div class="map-cell ${isActive ? 'active' : ''}" onclick="filterByRegion('${r.name}')">
                        ${isActive ? '<div class="map-cell-pulse"></div>' : ''}
                        <div class="map-cell-icon">${r.icon}</div>
                        <div class="map-cell-label">${r.name}</div>
                        <div class="map-cell-value">${count}</div>
                    </div>
                `;
            }).join('');
        }

        function updateEventsFeed(events) {
            const container = document.getElementById('eventsFeed');
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }
            container.innerHTML = events.slice(0, 20).map((e, i) => `
                <div class="event-item ${e.severity}" onclick="showEventDetail(${i})">
                    <div class="event-title">${escapeHtml(e.title)}</div>
                    <div class="event-meta">
                        <span class="event-severity severity-${e.severity}">${getSeverityText(e.severity)}</span>
                        <span class="event-source">📰 ${escapeHtml(e.source)}</span>
                        <span>🌏 ${escapeHtml(e.region)}</span>
                        <span>🕐 ${formatTime(e.publish_time)}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateRegionList(events) {
            const regionCount = {};
            events.forEach(e => { regionCount[e.region] = (regionCount[e.region] || 0) + 1; });
            const container = document.getElementById('regionList');
            const flags = {'全球':'🌍','北美':'🇺🇸','欧洲':'🇪','亚洲':'🌏','中东':'🕌','非洲':'🌍','南美':'🌎','大洋洲':'🌏'};
            container.innerHTML = Object.entries(regionCount).sort((a,b) => b[1]-a[1]).map(([r, c]) => `
                <div class="region-item" onclick="filterByRegion('${r}')">
                    <div class="region-name">
                        <span class="region-flag">${flags[r]||'🌐'}</span>
                        <span>${escapeHtml(r)}</span>
                    </div>
                    <div class="region-count">${c}</div>
                </div>
            `).join('');
        }

        function updateCategoryList(events) {
            const catCount = {};
            events.forEach(e => { catCount[e.category] = (catCount[e.category] || 0) + 1; });
            const container = document.getElementById('categoryList');
            const icons = {'新闻':'📰','科技':'💻','经济':'💰','政治':'🏛️','环境':'🌍','科学':'🔬'};
            const max = Math.max(...Object.values(catCount), 1);
            container.innerHTML = Object.entries(catCount).sort((a,b) => b[1]-a[1]).map(([c, n]) => `
                <div class="category-item">
                    <div class="category-name">
                        <span class="category-icon">${icons[c]||'📌'}</span>
                        <span>${escapeHtml(c)}</span>
                    </div>
                    <div class="category-bar">
                        <div class="category-fill" style="width:${Math.min(100, (n/max)*100)}%"></div>
                    </div>
                    <div class="category-count">${n}</div>
                </div>
            `).join('');
        }

        function updateAlertList(events) {
            const alerts = events.filter(e => e.is_alert).slice(0, 8);
            const container = document.getElementById('alertList');
            if (alerts.length === 0) {
                container.innerHTML = '<div class="loading" style="padding:20px;">暂无告警</div>';
                return;
            }
            container.innerHTML = alerts.map((a, i) => {
                const originalIndex = events.findIndex(e => e === a);
                return `
                    <div class="alert-item" onclick="showEventDetail(${originalIndex})">
                        <span class="alert-icon">⚠️</span>
                        <div class="alert-content">
                            <div class="alert-title">${escapeHtml(a.title)}</div>
                            <div class="alert-time">${formatTime(a.publish_time)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateUpdateTime(isoTime) {
            if (!isoTime) return;
            const date = new Date(isoTime);
            document.getElementById('updateTimeText').textContent = '最后更新：' + date.toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        }

        // 显示事件详情
        function showEventDetail(index) {
            if (!dataCache || !dataCache.data[index]) return;
            const event = dataCache.data[index];
            currentEvent = event;
            
            document.getElementById('modalTitle').textContent = event.title;
            document.getElementById('modalBody').innerHTML = `
                <div class="event-detail-section">
                    <div class="event-detail-label">事件摘要</div>
                    <div class="event-detail-value">${escapeHtml(event.summary || '暂无摘要')}</div>
                </div>
                <div class="event-detail-section">
                    <div class="event-detail-label">严重程度</div>
                    <div class="event-detail-value">
                        <span class="event-severity severity-${event.severity}">${getSeverityText(event.severity)}</span>
                    </div>
                </div>
                <div class="event-detail-meta">
                    <div class="meta-item">🌏 ${escapeHtml(event.region)}</div>
                    <div class="meta-item">📰 ${escapeHtml(event.source)}</div>
                    <div class="meta-item">🕐 ${formatTime(event.publish_time)}</div>
                    <div class="meta-item">🔥 热度：${event.heat_score || 50}</div>
                </div>
                ${event.source_url ? `<a href="${event.source_url}" target="_blank" class="event-link">查看原文 →</a>` : ''}
            `;
            
            document.getElementById('eventModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭弹窗
        function closeModal(e) {
            if (e.target.id === 'eventModal') {
                closeModalBtn();
            }
        }

        function closeModalBtn() {
            document.getElementById('eventModal').classList.remove('active');
            document.body.style.overflow = '';
            currentEvent = null;
        }

        // 按地区筛选
        function filterByRegion(region) {
            if (!dataCache) return;
            const filtered = dataCache.data.filter(e => e.region === region);
            if (filtered.length > 0) {
                updateEventsFeed(filtered);
                // 滚动到事件流
                document.getElementById('eventsFeed').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function formatTime(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        }

        function getSeverityText(sev) {
            const map = {critical: '严重', high: '高', medium: '中', low: '低'};
            return map[sev] || sev;
        }

        // 启动
        loadData();
        setInterval(loadData, 300000); // 5 分钟刷新
    </script>
</body>
</html>
