<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWatch 天眼 - 全球动态监控指挥中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111625;
            --bg-card: #1a1f3a;
            --border-color: #2a3f5f;
            --accent-cyan: #00d4ff;
            --accent-green: #00ff88;
            --accent-orange: #ff9500;
            --accent-red: #ff4757;
            --text-primary: #ffffff;
            --text-secondary: #8899aa;
            --gradient-1: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
            --gradient-2: linear-gradient(135deg, #1a1f3a 0%, #0a0e1a 100%);
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* 顶部导航 */
        .navbar {
            background: linear-gradient(180deg, rgba(17, 22, 37, 0.95) 0%, rgba(17, 22, 37, 0.8) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        
        .logo-text h1 {
            font-size: 22px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .logo-text p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 3px;
        }
        
        .nav-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 20px;
            font-size: 13px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* 主容器 */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px 40px;
            position: relative;
            z-index: 1;
        }
        
        /* 统计卡片区 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--gradient-2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.15);
        }
        
        .stat-card:hover::before {
            opacity: 1;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .stat-trend {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .trend-up { color: var(--accent-green); }
        .trend-down { color: var(--accent-red); }
        
        /* 图表区 */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: var(--gradient-2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-actions {
            display: flex;
            gap: 10px;
        }
        
        .chart-btn {
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .chart-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--accent-cyan);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        /* 事件列表 */
        .events-section {
            background: var(--gradient-2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
        }
        
        .events-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .events-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .event-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .event-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-cyan);
            transform: translateX(5px);
        }
        
        .event-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .event-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
            line-height: 1.5;
        }
        
        .event-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
            white-space: nowrap;
        }
        
        .badge-critical { background: rgba(255, 71, 87, 0.2); color: var(--accent-red); border: 1px solid var(--accent-red); }
        .badge-high { background: rgba(255, 149, 0, 0.2); color: var(--accent-orange); border: 1px solid var(--accent-orange); }
        .badge-medium { background: rgba(255, 234, 0, 0.2); color: #ffea00; border: 1px solid #ffea00; }
        .badge-low { background: rgba(0, 255, 136, 0.2); color: var(--accent-green); border: 1px solid var(--accent-green); }
        
        .event-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        
        .event-meta span {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .event-summary {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .event-heat {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }
        
        .heat-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .heat-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .heat-value {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 50px;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }
        
        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .main-container { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }
        
        .refresh-btn {
            background: var(--gradient-1);
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">🌍</div>
            <div class="logo-text">
                <h1>WorldWatch 天眼</h1>
                <p>全球动态监控指挥中心</p>
            </div>
        </div>
        <div class="nav-status">
            <div class="status-item">
                <div class="status-dot"></div>
                <span>系统运行正常</span>
            </div>
            <div class="status-item">
                <span id="lastUpdate">--:--:--</span>
            </div>
            <button class="refresh-btn" onclick="loadAllData()">
                <span>🔄</span> 刷新
            </button>
        </div>
    </nav>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="totalEvents">-</div>
                <div class="stat-label">总事件数</div>
                <div class="stat-trend trend-up">
                    <span>↑</span>
                    <span>实时监控中</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-value" id="alertEvents">-</div>
                <div class="stat-label">告警事件</div>
                <div class="stat-trend" id="alertTrend">
                    <span>--</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌏</div>
                <div class="stat-value" id="regions">-</div>
                <div class="stat-label">覆盖地区</div>
                <div class="stat-trend trend-up">
                    <span>全球</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="riskLevel">-</div>
                <div class="stat-label">风险等级</div>
                <div class="stat-trend" id="riskTrend">
                    <span>动态评估</span>
                </div>
            </div>
        </div>
        
        <!-- 图表区 -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">
                        <span>📈</span>
                        <span>事件趋势</span>
                    </div>
                    <div class="chart-actions">
                        <button class="chart-btn" onclick="setChartPeriod('7d')">7 天</button>
                        <button class="chart-btn" onclick="setChartPeriod('30d')">30 天</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">
                        <span>🗺️</span>
                        <span>地区分布</span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="regionChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 事件列表 -->
        <div class="events-section">
            <div class="events-header">
                <div class="events-title">
                    <span>🔥</span>
                    <span>热点事件</span>
                </div>
                <div class="chart-actions">
                    <button class="chart-btn" onclick="filterEvents('all')">全部</button>
                    <button class="chart-btn" onclick="filterEvents('critical')">紧急</button>
                    <button class="chart-btn" onclick="filterEvents('high')">高</button>
                </div>
            </div>
            <div class="event-list" id="eventList">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>正在加载全球动态数据...</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部 -->
    <footer class="footer">
        <p>WorldWatch 天眼 v1.0.0 | WaveUP 航海计划 | 数据源：微博/知乎/百度新闻 | 更新于 <span id="footerTime">-</span></p>
    </footer>
    
    <script>
        const API_BASE = window.location.origin;
        let trendChartInstance = null;
        let regionChartInstance = null;
        let allEvents = [];
        
        // 初始化图表
        function initCharts() {
            // 趋势图
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChartInstance = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: '事件数量',
                        data: [12, 19, 15, 25, 22, 30, 28],
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#00d4ff',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#8899aa' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#8899aa' },
                            beginAtZero: true
                        }
                    }
                }
            });
            
            // 地区分布图
            const regionCtx = document.getElementById('regionChart').getContext('2d');
            regionChartInstance = new Chart(regionCtx, {
                type: 'doughnut',
                data: {
                    labels: ['亚洲', '欧洲', '北美', '其他'],
                    datasets: [{
                        data: [35, 25, 20, 20],
                        backgroundColor: [
                            'rgba(0, 212, 255, 0.8)',
                            'rgba(0, 255, 136, 0.8)',
                            'rgba(255, 149, 0, 0.8)',
                            'rgba(255, 71, 87, 0.8)'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#8899aa', padding: 15 }
                        }
                    }
                }
            });
        }
        
        // 加载数据
        async function loadAllData() {
            try {
                // 加载统计
                const statsRes = await fetch(`${API_BASE}/api/v1/events/stats/overview`);
                const stats = await statsRes.json();
                
                if (stats.code === 0) {
                    document.getElementById('totalEvents').textContent = stats.data.total_events || 0;
                    document.getElementById('alertEvents').textContent = stats.data.alert_events || 0;
                    document.getElementById('regions').textContent = stats.data.by_region?.length || 0;
                    
                    // 更新地区图表
                    if (stats.data.by_region && regionChartInstance) {
                        regionChartInstance.data.labels = stats.data.by_region.map(r => r.region);
                        regionChartInstance.data.datasets[0].data = stats.data.by_region.map(r => r.count);
                        regionChartInstance.update();
                    }
                }
                
                // 加载情报分析
                const analysisRes = await fetch(`${API_BASE}/api/v1/intelligence/analysis`);
                const analysis = await analysisRes.json();
                
                if (analysis.code === 0) {
                    const riskMap = { low: '低', medium: '中', high: '高', critical: '严重' };
                    const riskColor = { low: '#00ff88', medium: '#ffea00', high: '#ff9500', critical: '#ff4757' };
                    const risk = analysis.data.risk_level || 'medium';
                    document.getElementById('riskLevel').textContent = riskMap[risk] || '中';
                    document.getElementById('riskLevel').style.color = riskColor[risk] || '#ffea00';
                }
                
                // 加载事件列表
                const eventsRes = await fetch(`${API_BASE}/api/v1/events/list?limit=20`);
                const events = await eventsRes.json();
                
                allEvents = events.data || [];
                renderEvents(allEvents);
                
                // 更新时间
                const now = new Date();
                const timeStr = now.toLocaleTimeString('zh-CN');
                document.getElementById('lastUpdate').textContent = timeStr;
                document.getElementById('footerTime').textContent = now.toLocaleString('zh-CN');
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('eventList').innerHTML = `
                    <div style="text-align:center;padding:40px;color:#ff4757;">
                        <div style="font-size:48px;margin-bottom:15px;">⚠️</div>
                        <div>数据加载失败</div>
                        <div style="font-size:13px;margin-top:10px;color:#8899aa;">${error.message}</div>
                        <button class="chart-btn" onclick="loadAllData()" style="margin-top:15px;">重试</button>
                    </div>
                `;
            }
        }
        
        // 渲染事件列表
        function renderEvents(events, filter = 'all') {
            const eventList = document.getElementById('eventList');
            
            let filtered = events;
            if (filter !== 'all') {
                filtered = events.filter(e => e.severity === filter);
            }
            
            if (filtered.length === 0) {
                eventList.innerHTML = '<div class="loading">暂无事件数据</div>';
                return;
            }
            
            eventList.innerHTML = filtered.map((event, index) => `
                <div class="event-card" style="animation: fadeIn ${0.1 * index}s ease both">
                    <div class="event-top">
                        <div class="event-title">${escapeHtml(event.title)}</div>
                        <span class="event-badge badge-${event.severity || 'medium'}">${getSeverityText(event.severity)}</span>
                    </div>
                    <div class="event-meta">
                        <span>🌏 ${event.region || '未知'}</span>
                        <span>📁 ${event.category || '其他'}</span>
                        <span>🔥 热度：${(event.heat_score || 0).toFixed(1)}</span>
                        <span>⏰ ${event.publish_time ? new Date(event.publish_time).toLocaleString('zh-CN') : '未知'}</span>
                    </div>
                    <div class="event-summary">${escapeHtml(event.summary || '暂无摘要')}</div>
                    <div class="event-heat">
                        <div class="heat-bar">
                            <div class="heat-fill" style="width: ${Math.min(100, (event.heat_score || 0) * 10)}%"></div>
                        </div>
                        <div class="heat-value">${(event.heat_score || 0).toFixed(0)}%</div>
                    </div>
                </div>
            `).join('');
        }
        
        // 筛选事件
        function filterEvents(filter) {
            renderEvents(allEvents, filter);
        }
        
        // 设置图表周期
        function setChartPeriod(period) {
            // 模拟数据更新
            const newData = period === '7d' 
                ? [12, 19, 15, 25, 22, 30, 28]
                : [45, 52, 38, 65, 58, 72, 68, 75, 82, 78];
            
            if (trendChartInstance) {
                trendChartInstance.data.datasets[0].data = newData;
                trendChartInstance.update();
            }
        }
        
        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getSeverityText(severity) {
            const map = { critical: '紧急', high: '高', medium: '中', low: '低' };
            return map[severity] || '中';
        }
        
        // 添加淡入动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
        
        // 初始化
        initCharts();
        loadAllData();
        
        // 每 60 秒自动刷新
        setInterval(loadAllData, 60000);
    </script>
</body>
</html>
