<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>WorldWatch 天眼 - 全球动态监控指挥中心</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c1929 0%, #1a2a4a 100%);
            color: #e0e6ed;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }
        .header {
            background: rgba(12, 25, 41, 0.95);
            border-bottom: 1px solid #1e3a5f;
            padding: 0 calc(16px + var(--safe-left)) 0 calc(16px + var(--safe-right));
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            height: calc(56px + var(--safe-top));
            padding-top: var(--safe-top);
            display: flex;
            align-items: center;
            justify-content: space-between;
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            backdrop-filter: saturate(180%) blur(20px);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 24px; flex-shrink: 0; }
        .logo-text {
            font-size: 17px; font-weight: 700;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        .header-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .status-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 16px;
            font-size: 11px;
        }
        .status-dot {
            width: 6px; height: 6px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .time-display { font-family: 'Courier New', monospace; font-size: 13px; color: #00d9ff; }
        
        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            padding: calc(72px + var(--safe-top)) calc(16px + var(--safe-right)) 16px calc(16px + var(--safe-left));
            min-height: 100vh;
        }
        
        .panel {
            background: rgba(18, 32, 53, 0.9);
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(90deg, rgba(30, 58, 95, 0.9), rgba(18, 32, 53, 0.9));
            padding: 12px 16px;
            border-bottom: 1px solid #1e3a5f;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-content { padding: 16px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .stats-card {
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.6), rgba(18, 32, 53, 0.6));
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { font-size: 11px; color: #8899ac; margin-top: 6px; }
        
        .region-list { max-height: 250px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .region-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(30, 58, 95, 0.5);
        }
        .region-item:last-child { border-bottom: none; }
        .region-name { display: flex; align-items: center; gap: 10px; }
        .region-flag { font-size: 18px; }
        .region-count {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .events-feed { max-height: 400px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .event-item {
            background: rgba(30, 58, 95, 0.4);
            border-left: 3px solid #00d9ff;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
            transition: transform 0.2s;
            -webkit-transition: -webkit-transform 0.2s;
        }
        .event-item:active {
            transform: scale(0.98);
            -webkit-transform: scale(0.98);
        }
        .event-item:last-child { margin-bottom: 0; }
        .event-item.critical { border-left-color: #ff4757; }
        .event-item.high { border-left-color: #ffa502; }
        .event-item.medium { border-left-color: #ffdd59; }
        .event-item.low { border-left-color: #00d9ff; }
        .event-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.5; }
        .event-meta { display: flex; gap: 10px; font-size: 11px; color: #8899ac; flex-wrap: wrap; }
        .event-source { color: #00d9ff; }
        
        .category-list { }
        .category-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(30, 58, 95, 0.5);
        }
        .category-item:last-child { border-bottom: none; }
        .category-name { display: flex; align-items: center; gap: 10px; }
        .category-icon { font-size: 18px; }
        .category-bar {
            flex: 1;
            height: 6px;
            background: rgba(30, 58, 95, 0.5);
            border-radius: 3px;
            margin: 0 12px;
            overflow: hidden;
        }
        .category-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 3px;
        }
        .category-count { font-size: 12px; color: #00d9ff; min-width: 30px; text-align: right; font-weight: 600; }
        
        .alert-list { max-height: 250px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .alert-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .alert-item:last-child { margin-bottom: 0; }
        .alert-icon { font-size: 20px; }
        .alert-content { flex: 1; min-width: 0; }
        .alert-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .alert-time { font-size: 10px; color: #8899ac; }
        
        .data-sources { font-size: 13px; color: #8899ac; line-height: 2.2; }
        
        .refresh-btn {
            background: rgba(0,217,255,0.2);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            -webkit-transition: all 0.2s;
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .refresh-btn:active {
            background: rgba(0,217,255,0.3);
            transform: scale(0.95);
        }
        
        .loading {
            display: flex; align-items: center; justify-content: center;
            padding: 30px 20px;
            color: #8899ac;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(0, 217, 255, 0.2);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .update-time {
            text-align: center;
            font-size: 11px;
            color: #8899ac;
            padding: 12px;
            border-top: 1px solid rgba(30, 58, 95, 0.5);
        }
        
        .world-viz {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 16px;
        }
        .viz-item {
            background: rgba(30, 58, 95, 0.3);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .viz-icon { font-size: 24px; margin-bottom: 6px; }
        .viz-label { font-size: 11px; color: #8899ac; }
        .viz-value { font-size: 16px; font-weight: 600; color: #00d9ff; margin-top: 4px; }
        
        /* 手机横屏和小平板 */
        @media (min-width: 640px) {
            .main-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .panel:first-child {
                grid-column: 1 / -1;
            }
        }
        
        /* 桌面 */
        @media (min-width: 1024px) {
            .main-container {
                grid-template-columns: 280px 1fr 320px;
                padding: 80px 24px 24px;
                gap: 20px;
            }
            .stats-grid { gap: 16px; }
            .stats-card { padding: 20px 16px; }
            .stat-value { font-size: 32px; }
        }
        
        /* 大屏桌面 */
        @media (min-width: 1440px) {
            .main-container {
                max-width: 1600px;
                margin: 0 auto;
            }
        }
        
        /* 小屏手机优化 */
        @media (max-width: 375px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .stats-card {
                padding: 12px 8px;
            }
            .stat-value {
                font-size: 22px;
            }
            .stat-label {
                font-size: 10px;
            }
            .logo-text {
                font-size: 15px;
            }
            .world-viz {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🌍</span>
            <span class="logo-text">WorldWatch 天眼</span>
        </div>
        <div class="header-controls">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>运行正常</span>
            </div>
            <div class="time-display" id="timeDisplay">--:--</div>
        </div>
    </header>

    <div class="main-container">
        <!-- 统计概览 -->
        <div class="panel">
            <div class="panel-header">📊 统计概览</div>
            <div class="panel-content">
                <div class="stats-grid">
                    <div class="stats-card">
                        <div class="stat-value" id="totalEvents">-</div>
                        <div class="stat-label">总事件</div>
                    </div>
                    <div class="stats-card">
                        <div class="stat-value" id="alertCount">-</div>
                        <div class="stat-label">告警</div>
                    </div>
                    <div class="stats-card">
                        <div class="stat-value" id="regionCount">-</div>
                        <div class="stat-label">地区</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 全球监控 -->
        <div class="panel">
            <div class="panel-header">
                <span>🌐 全球监控</span>
                <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
            </div>
            <div class="panel-content">
                <div class="world-viz">
                    <div class="viz-item">
                        <div class="viz-icon">🌏</div>
                        <div class="viz-label">亚洲</div>
                        <div class="viz-value" id="asiaCount">-</div>
                    </div>
                    <div class="viz-item">
                        <div class="viz-icon">🇺🇸</div>
                        <div class="viz-label">北美</div>
                        <div class="viz-value" id="naCount">-</div>
                    </div>
                    <div class="viz-item">
                        <div class="viz-icon">🇪🇺</div>
                        <div class="viz-label">欧洲</div>
                        <div class="viz-value" id="euCount">-</div>
                    </div>
                    <div class="viz-item">
                        <div class="viz-icon">🌍</div>
                        <div class="viz-label">其他</div>
                        <div class="viz-value" id="otherCount">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 实时事件流 -->
        <div class="panel">
            <div class="panel-header">🔥 实时事件流</div>
            <div class="panel-content">
                <div class="events-feed" id="eventsFeed">
                    <div class="loading">
                        <div class="spinner"></div>
                        <span>加载中...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 地区分布 -->
        <div class="panel">
            <div class="panel-header">🌏 地区分布</div>
            <div class="panel-content">
                <div class="region-list" id="regionList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 事件分类 -->
        <div class="panel">
            <div class="panel-header">📈 事件分类</div>
            <div class="panel-content">
                <div class="category-list" id="categoryList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 告警列表 -->
        <div class="panel">
            <div class="panel-header">⚠️ 告警列表</div>
            <div class="panel-content">
                <div class="alert-list" id="alertList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据源 -->
        <div class="panel">
            <div class="panel-header">ℹ️ 数据源</div>
            <div class="panel-content">
                <div class="data-sources">
                    <div>📰 36Kr</div>
                    <div>📰 IT 之家</div>
                    <div>📰 The Verge</div>
                    <div>📰 TechCrunch</div>
                    <div>💬 Reddit</div>
                </div>
                <div class="update-time" id="updateTime"></div>
            </div>
        </div>
    </div>

    <script>
        let dataCache = null;

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit', hour12: false});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 加载数据
        async function loadData() {
            const feed = document.getElementById('eventsFeed');
            feed.innerHTML = '<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
            
            try {
                const res = await fetch('/api/v1/events/list?limit=50');
                const result = await res.json();
                dataCache = result;
                
                updateStats(result.data);
                updateEventsFeed(result.data);
                updateRegionList(result.data);
                updateCategoryList(result.data);
                updateAlertList(result.data);
                updateWorldViz(result.data);
                updateUpdateTime(result.last_update);
            } catch(error) {
                console.error('加载失败:', error);
                feed.innerHTML = '<div class="loading">加载失败，请刷新</div>';
            }
        }

        function updateStats(events) {
            const regions = new Set(events.map(e => e.region));
            const alerts = events.filter(e => e.is_alert).length;
            document.getElementById('totalEvents').textContent = events.length;
            document.getElementById('alertCount').textContent = alerts;
            document.getElementById('regionCount').textContent = regions.size;
        }

        function updateWorldViz(events) {
            const counts = {亚洲:0, 北美:0, 欧洲:0, 其他:0};
            events.forEach(e => {
                if (counts[e.region] !== undefined) counts[e.region]++;
                else counts.其他++;
            });
            document.getElementById('asiaCount').textContent = counts.亚洲;
            document.getElementById('naCount').textContent = counts.北美;
            document.getElementById('euCount').textContent = counts.欧洲;
            document.getElementById('otherCount').textContent = counts.其他;
        }

        function updateEventsFeed(events) {
            const container = document.getElementById('eventsFeed');
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }
            container.innerHTML = events.slice(0, 20).map(e => `
                <div class="event-item ${e.severity}">
                    <div class="event-title">${escapeHtml(e.title)}</div>
                    <div class="event-meta">
                        <span class="event-source">📰 ${escapeHtml(e.source)}</span>
                        <span>🌏 ${escapeHtml(e.region)}</span>
                        <span>🕐 ${formatTime(e.publish_time)}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateRegionList(events) {
            const regionCount = {};
            events.forEach(e => { regionCount[e.region] = (regionCount[e.region] || 0) + 1; });
            const container = document.getElementById('regionList');
            const flags = {'全球':'🌍','北美':'🇺🇸','欧洲':'🇪','亚洲':'🌏','中东':'🕌','非洲':'🌍','南美':'🌎','大洋洲':'🌏'};
            container.innerHTML = Object.entries(regionCount).sort((a,b) => b[1]-a[1]).map(([r, c]) => `
                <div class="region-item">
                    <div class="region-name">
                        <span class="region-flag">${flags[r]||'🌐'}</span>
                        <span>${escapeHtml(r)}</span>
                    </div>
                    <div class="region-count">${c}</div>
                </div>
            `).join('');
        }

        function updateCategoryList(events) {
            const catCount = {};
            events.forEach(e => { catCount[e.category] = (catCount[e.category] || 0) + 1; });
            const container = document.getElementById('categoryList');
            const icons = {'新闻':'📰','科技':'💻','经济':'💰','政治':'🏛️','环境':'🌍','科学':'🔬'};
            const max = Math.max(...Object.values(catCount), 1);
            container.innerHTML = Object.entries(catCount).sort((a,b) => b[1]-a[1]).map(([c, n]) => `
                <div class="category-item">
                    <div class="category-name">
                        <span class="category-icon">${icons[c]||'📌'}</span>
                        <span>${escapeHtml(c)}</span>
                    </div>
                    <div class="category-bar">
                        <div class="category-fill" style="width:${Math.min(100, (n/max)*100)}%"></div>
                    </div>
                    <div class="category-count">${n}</div>
                </div>
            `).join('');
        }

        function updateAlertList(events) {
            const alerts = events.filter(e => e.is_alert).slice(0, 8);
            const container = document.getElementById('alertList');
            if (alerts.length === 0) {
                container.innerHTML = '<div class="loading" style="padding:20px;">暂无告警</div>';
                return;
            }
            container.innerHTML = alerts.map(a => `
                <div class="alert-item">
                    <span class="alert-icon">⚠️</span>
                    <div class="alert-content">
                        <div class="alert-title">${escapeHtml(a.title)}</div>
                        <div class="alert-time">${formatTime(a.publish_time)}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateUpdateTime(isoTime) {
            if (!isoTime) return;
            const date = new Date(isoTime);
            document.getElementById('updateTime').textContent = '最后更新：' + date.toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function formatTime(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        }

        // 启动
        loadData();
        setInterval(loadData, 300000); // 5 分钟刷新
    </script>
</body>
</html>
